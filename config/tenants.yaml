# MAEA Tenant Gateway — Tenant Configuration
# Place at config/tenants.yaml

tenants:
  finance:
    workspace_id: "ws_finance_001"
    display_name: "Finance Department"
    sso:
      provider: "azure_ad"
      tenant_id: "contoso.com"
      group_role_mapping:
        "finance-admins": "admin"
        "finance-analysts": "editor"
    isolation:
      dataset_filter: "tenant=finance"
      app_visibility: "workspace_only"
    rate_limits:
      max_tokens_per_day: 5000000
      max_api_calls_per_minute: 100

  customer_support:
    workspace_id: "ws_support_002"
    display_name: "Customer Support"
    sso:
      provider: "okta"
      domain: "support.example.com"
    isolation:
      dataset_filter: "tenant=support"
      app_visibility: "workspace_only"
    rate_limits:
      max_tokens_per_day: 2000000
      max_api_calls_per_minute: 60

  engineering:
    workspace_id: "ws_eng_003"
    display_name: "Engineering"
    sso:
      provider: "github"
      org: "example-org"
    isolation:
      dataset_filter: "tenant=engineering"
      app_visibility: "workspace_only"
    rate_limits:
      max_tokens_per_day: 10000000
      max_api_calls_per_minute: 200
